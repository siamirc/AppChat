name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5' 

      # บังคับปลดล็อกและข้ามตัวแปรตรวจรหัสความปลอดภัยตอนบิลด์โดยเฉพาะ
      - name: Build Debug APK (Ignore Signing)
        run: gradle assembleDebug -x lint -Pandroid.packageSigningConfigs=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppChat-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
