name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # อัปเกรดมาใช้ Java 21 เพื่อให้รองรับ Gradle 9+ ได้อย่างสมบูรณ์
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # อัปเกรดเวอร์ชัน Gradle เป็น 9.3.1 ตามที่ระบบแจ้ง Error ร้องขอ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1' 

      - name: Build Debug APK
        run: gradle assembleDebug -x lint -Pandroid.packageSigningConfigs=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppChat-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
